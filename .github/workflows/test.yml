name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # 仅安装测试所需的基础依赖（不安装 torch/omnivoice/faster-whisper，测试用 mock）
          pip install gradio soundfile numpy imageio-ffmpeg || true

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          python -m pytest tests/ --cov=tts_skill --cov-report=xml || true

      - name: Verify CLI works
        env:
          PYTHONUTF8: 1
        run: |
          python -m tts_skill --version
          python -m tts_skill --help
          python -m tts_skill doctor

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint with flake8
        run: |
          # 停止构建，如果有语法错误或未定义的名称
          flake8 tts_skill --count --select=E9,F63,F7,F82 --show-source --statistics
          # 退出零作为警告（不阻塞 CI）
          flake8 tts_skill --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
